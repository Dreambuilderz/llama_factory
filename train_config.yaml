## Anti-Glitch Checklist

| Problem | Cause | Fix |
|---|---|---|
| Character face changes between clips | No LoRA / IP-Adapter | Train character LoRA, use ip_adapter_scale=0.7 |
| Jittery motion at clip boundaries | Different frame rates | Normalize all clips to same fps before concat |
| Audio/video desync | Varying clip durations | Use `-shortest` flag, validate clip durations before assembly |
| Color flickering between clips | Different CFG scales | Lock guidance_scale=6.0 across all clips |
| Location inconsistency | Vague location prompts | Include specific location in every prompt, not just first |
| Background music cuts out | Music shorter than video | Use `aloop=loop=-1` in FFmpeg to loop music |

