## Character Consistency System

### Option A: IP-Adapter (no training required)
```python
# Inject reference image into every generation call
pipeline.set_ip_adapter_scale(0.7)  # 0.6-0.8 sweet spot
result = pipeline(
    prompt=f"ALEXCHAR, {scene_prompt}",
    ip_adapter_image=character_reference_image,
    ...
)
```
**Pros:** No training, works immediately  
**Cons:** ~70-80% facial consistency, drifts on complex poses

### Option B: Character LoRA (recommended for production)
```bash
# Train on 15-30 images of your character (real or generated)
# Using kohya_ss or SimpleTuner
python train_network.py \
  --pretrained_model_name_or_path="Wan-AI/Wan2.1-14B" \
  --train_data_dir="./character_images" \
  --output_dir="./character_lora" \
  --resolution=512 \
  --max_train_steps=1500 \
  --learning_rate=1e-4 \
  --network_module=networks.lora \
  --trigger_word="ALEXCHAR"
```
**Pros:** 95%+ consistency, works at any pose/angle  
**Cons:** Needs 30min training on A100, requires source images

### Option C: Both (production standard)
Load the LoRA + IP-Adapter together. LoRA handles character identity, IP-Adapter handles expression/pose coherence.

