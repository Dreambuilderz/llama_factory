## FFmpeg Assembly Pipeline

```python
import subprocess
import os

def assemble_final_video(
    clip_paths: list[str],
    narration_paths: list[dict],
    output_path: str = "final_video.mp4"
):
    """Assemble all clips + narration into final video."""
    
    # Step 1: Write clip concat list
    concat_list = "concat_list.txt"
    with open(concat_list, "w") as f:
        for clip in sorted(clip_paths):
            f.write(f"file '{os.path.abspath(clip)}'\n")
    
    # Step 2: Concatenate all video clips (no re-encode = fast)
    raw_video = "raw_concat.mp4"
    subprocess.run([
        "ffmpeg", "-y", "-f", "concat", "-safe", "0",
        "-i", concat_list, "-c", "copy", raw_video
    ], check=True)
    
    # Step 3: Concatenate narration audio files
    narration_concat = "narration_concat.txt"
    with open(narration_concat, "w") as f:
        for item in sorted(narration_paths, key=lambda x: x["scene_id"]):
            f.write(f"file '{os.path.abspath(item['path'])}'\n")
    
    raw_audio = "narration_full.wav"
    subprocess.run([
        "ffmpeg", "-y", "-f", "concat", "-safe", "0",
        "-i", narration_concat, "-c", "copy", raw_audio
    ], check=True)
    
    # Step 4: Merge video + narration audio
    subprocess.run([
        "ffmpeg", "-y",
        "-i", raw_video,
        "-i", raw_audio,
        "-c:v", "copy",
        "-c:a", "aac", "-b:a", "192k",
        "-map", "0:v:0", "-map", "1:a:0",
        "-shortest",
        output_path
    ], check=True)
    
    print(f"✅ Final video: {output_path}")
    return output_path


def add_background_music(
    video_path: str,
    music_path: str,
    output_path: str,
    music_volume: float = 0.15  # keep music under narration
):
    """Mix background music under narration audio."""
    subprocess.run([
        "ffmpeg", "-y",
        "-i", video_path,
        "-i", music_path,
        "-filter_complex",
        f"[1:a]volume={music_volume},aloop=loop=-1:size=2e+09[music];"
        "[0:a][music]amix=inputs=2:duration=first:dropout_transition=2[aout]",
        "-map", "0:v", "-map", "[aout]",
        "-c:v", "copy", "-c:a", "aac", "-b:a", "192k",
        output_path
    ], check=True)
```

