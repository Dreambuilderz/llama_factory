## TTS Narration Generation

```python
import torchaudio
from chatterbox.tts import ChatterboxTTS  # pip install chatterbox-tts

def generate_narration(narration_json: str, voice_ref: str = None) -> list[str]:
    """Generate TTS for all narration lines."""
    model = ChatterboxTTS.from_pretrained(device="cuda")
    
    with open(narration_json) as f:
        lines = json.load(f)
    
    audio_paths = []
    for line in lines:
        if not line["text"].strip():
            continue
        
        output_path = f"./narration/scene_{line['scene_id']:04d}.wav"
        
        wav = model.generate(
            line["text"],
            audio_prompt_path=voice_ref,  # clone your character's voice
            exaggeration=0.4,  # 0=neutral, 1=very expressive
            cfg_weight=0.5,
        )
        torchaudio.save(output_path, wav, model.sr)
        audio_paths.append({"scene_id": line["scene_id"], "path": output_path})
    
    return audio_paths
```

