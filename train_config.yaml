# AI Video Generation Pipeline
## Full Architecture for 1-Hour Consistent-Character Videos

---

## System Overview

```
TREND DATA → SCRIPT → SCENES → VIDEO CLIPS → AUDIO → ASSEMBLE → FINAL VIDEO
  (YT API)   (LLM)  (720x5s)  (Wan/CogVX)  (TTS+Music)  (FFmpeg)  (1hr MP4)
```

---

## Stack

| Layer | Tool | Notes |
|---|---|---|
| Script Gen | Qwen3-VL-235B or Claude API | Long context, structured JSON output |
| Video Gen | **Wan2.1-14B** (recommended) | Best open-source quality as of 2025 |
| Alt Video Gen | CogVideoX-5B | Faster, slightly lower quality |
| Character Consistency | IP-Adapter + character LoRA | Reference image injected every clip |
| TTS | **Chatterbox TTS** (Resemble AI) | Emotional, natural, free/open |
| Alt TTS | Kokoro-82M | Fastest local option |
| Music | MusicGen-Large (Meta AudioCraft) | 30s loops, mood-matched |
| Assembly | **FFmpeg** | Concat + audio sync + transitions |
| Orchestration | Python + Ray | Parallel GPU clip generation |
| Storage | Local NVMe or S3 | 720 clips ~50GB raw |

