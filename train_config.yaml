## Full Pipeline Runner

```python
async def run_full_pipeline(topic: str = None):
    # 1. Generate script
    os.makedirs("clips", exist_ok=True)
    os.makedirs("narration", exist_ok=True)
    
    from script_generator import main as gen_script
    script_data = await gen_script(topic)
    
    # Save pipeline JSON
    pipeline_json = "pipeline_latest.json"
    with open(pipeline_json, "w") as f:
        json.dump(script_data, f)
    
    # 2. Generate video clips (parallel on N GPUs)
    print("\n🎬 Generating video clips...")
    clip_paths = run_generation(pipeline_json, num_gpus=4)
    
    # 3. Generate narration audio
    print("\n🎙 Generating narration audio...")
    narration_json = pipeline_json.replace("pipeline", "narration")
    narration_paths = generate_narration(narration_json, voice_ref="./voice_reference.wav")
    
    # 4. Assemble
    print("\n🎞 Assembling final video...")
    raw_output = "final_raw.mp4"
    assemble_final_video(clip_paths, narration_paths, raw_output)
    
    # 5. Add background music
    final_output = f"final_{datetime.now().strftime('%Y%m%d_%H%M%S')}.mp4"
    add_background_music(raw_output, "./music/ambient_loop.mp3", final_output)
    
    print(f"\n✅ Pipeline complete: {final_output}")

if __name__ == "__main__":
    asyncio.run(run_full_pipeline())
```

