## Clip Generation Loop

```python
import ray
from wan_pipeline import WanVideoPipeline  # pseudocode, use actual Wan2.1 loader

@ray.remote(num_gpus=1)
class VideoWorker:
    def __init__(self, gpu_id: int):
        self.pipeline = WanVideoPipeline.from_pretrained(
            "Wan-AI/Wan2.1-T2V-14B",
            torch_dtype=torch.bfloat16,
        ).to(f"cuda:{gpu_id}")
        self.pipeline.load_lora_weights("./character_lora")
        self.pipeline.load_ip_adapter("h94/IP-Adapter-FaceID")
        
    def generate_clip(self, scene: dict, char_ref: str) -> str:
        output_path = f"./clips/scene_{scene['scene_id']:04d}.mp4"
        if os.path.exists(output_path):
            return output_path  # skip if already generated (resumable)
        
        frames = self.pipeline(
            prompt=scene["prompt"],
            negative_prompt=scene["negative_prompt"],
            ip_adapter_image=Image.open(char_ref),
            ip_adapter_scale=0.72,
            num_frames=scene["num_frames"],   # 5s * 10fps = 50 frames
            num_inference_steps=30,
            guidance_scale=6.0,
            width=1920,
            height=1080,
        ).frames[0]
        
        export_to_video(frames, output_path, fps=10)
        return output_path


def run_generation(pipeline_json: str, num_gpus: int = 4):
    with open(pipeline_json) as f:
        data = json.load(f)
    
    scenes = data["pipeline_inputs"]["video_generation"]
    char_ref = "./character_reference.png"
    
    ray.init()
    workers = [VideoWorker.remote(i) for i in range(num_gpus)]
    
    # Distribute scenes across workers
    futures = []
    for i, scene in enumerate(scenes):
        worker = workers[i % num_gpus]
        futures.append(worker.generate_clip.remote(scene, char_ref))
    
    # Collect results with progress
    clip_paths = []
    for i, future in enumerate(futures):
        path = ray.get(future)
        clip_paths.append(path)
        print(f"Progress: {i+1}/{len(scenes)} clips ({(i+1)/len(scenes)*100:.1f}%)")
    
    return clip_paths
```

